const sb = async (method, path, body) => {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers: HEADERS,
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === "DELETE" || r.status === 204) return [];
  const data = await r.json();
  if (!r.ok) throw new Error(data.message || JSON.stringify(data));
  return data;
};

const sentimentColor = (label) => {
  const l = String(label).toLowerCase();
  if (l.includes("very well") || l.includes("very clear") || (l.includes("yes") && l.includes("exactly")) || l === "yes") return "#16A34A";
  if (l.includes("adequately") || l === "well" || l.includes("faster updates") || l.includes("timely, but")) return "#0D9488";
  if (l.includes("somewhat") || l.includes("think so") || l.includes("fewer updates")) return "#EAB308";
  if (l.includes("very poorly")) return "#991B1B";
  if (l.includes("poorly") || l.includes("neither") || l.includes("rely on others") || l.includes("often unsure") || l === "no") return "#DC2626";
  if (l.includes("not sure") || l.includes("not applicable") || l.includes("other")) return "#94A3B8";
  if (l.includes("all of the above")) return "#7C3AED";
  return "#2563EB";
};

const SurveyBar = ({data, total, sortDesc=true}) => {
  let entries = Object.entries(data);
  if (sortDesc) entries.sort((a,b)=>b[1]-a[1]);
  const localMax = Math.max(...entries.map(([,v])=>v));
  return (
    <div style={{display:"flex",flexDirection:"column",gap:11}}>
      {entries.map(([label,value])=>{
        const widthPct = (value/localMax*100);
        const pct = ((value/total)*100).toFixed(1);
        const color = sentimentColor(label);
        return (
          <div key={label}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,marginBottom:5,fontSize:12.5,alignItems:"baseline"}}>
              <span style={{color:"#334155",lineHeight:1.35,flex:1}}>{label}</span>
              <span style={{color:"#64748B",fontWeight:600,whiteSpace:"nowrap",fontVariantNumeric:"tabular-nums"}}>{value.toLocaleString()} · {pct}%</span>
            </div>
            <div style={{height:9,background:"#F1F5F9",borderRadius:5,overflow:"hidden"}}>
              <div style={{width:`${widthPct}%`,height:"100%",background:color,borderRadius:5,transition:"width 0.6s ease"}}/>
            </div>
          </div>
        );
      })}
    </div>
  );
};

const MATRIX_EXAMPLES = {
  "Law enforcement visits (ICE, Police, FBI)": {severity:"Critical",rto:"< 1 hour",response_lead:"Director of Security",immediate_actions:"1. Do not obstruct officers. 2. Request badge IDs and warrant. 3. Contact Legal immediately. 4. Escort officers to designated area. 5. Document everything.",communication:"Legal team via phone immediately; HR notified within 15 min; Leadership briefed within 30 min; staff memo if needed within 1 hour",escalation_path:"Security Lead → Legal Director → COO → CEO → External Counsel"},
  "Cyber attack": {severity:"Critical",rto:"1-4 hours",response_lead:"IT Security Manager",immediate_actions:"1. Isolate affected systems from network. 2. Activate incident response plan. 3. Preserve forensic evidence. 4. Notify IT leadership. 5. Engage external cybersecurity firm if needed.",communication:"IT team via Slack war room immediately; Leadership via phone within 15 min; affected staff via email within 1 hour; clients if data breach confirmed",escalation_path:"IT Security → CTO → CEO → External Cyber Firm → Legal (if breach)"},
  "International political unrest affecting employees (Venezuela, Mexico, Iran, etc.)": {severity:"Medium",rto:"1-3 days",response_lead:"HR Director",immediate_actions:"1. Identify affected employees by location/nationality. 2. Send wellness check communication. 3. Offer EAP resources. 4. Assess impact on case workload. 5. Coordinate flexible work arrangements.",communication:"HR direct outreach to affected employees within 2 hours; leadership briefed same day; all-staff sensitivity memo if widespread",escalation_path:"HR Director → Legal (case impact) → COO → CEO"},
  "Executive announcements or presidential statements on immigration": {severity:"Medium",rto:"1-3 days",response_lead:"Legal Director",immediate_actions:"1. Legal team reviews announcement impact on active cases. 2. Draft client-facing FAQ. 3. Prepare internal talking points. 4. Brief client-facing staff. 5. Monitor for follow-up developments.",communication:"Internal legal memo within 2 hours; client FAQ via email within 24 hours; social media statement coordinated with Marketing",escalation_path:"Legal Director → Marketing Director → CEO → External Immigration Counsel"},
  "Scams using the Lisinski name or impersonating Angel (clients being defrauded)": {severity:"High",rto:"4-24 hours",response_lead:"Marketing Director",immediate_actions:"1. Document the scam (screenshots, URLs, phone numbers). 2. Report to FTC and relevant authorities. 3. Issue client warning via email and social media. 4. Contact platforms to take down fraudulent accounts. 5. Brief front desk and intake on how to handle client inquiries.",communication:"Internal alert to all staff within 1 hour; client warning blast via email and social media within 4 hours; media statement if press inquiries arise",escalation_path:"Marketing Director → Legal Director → CEO → External PR Firm (if needed)"},
  "Building damage (water, gas, fire on business or non-business hours)": {severity:"High",rto:"4-24 hours",response_lead:"Operations Manager",immediate_actions:"1. Ensure employee safety and evacuate if needed. 2. Call emergency services (fire/gas). 3. Contact building management. 4. Assess damage and document with photos. 5. Activate remote work plan if office unusable.",communication:"All-staff alert via mass text within 15 min; leadership briefed via phone; building management and insurance notified same day",escalation_path:"Operations Manager → Facilities Lead → COO → CEO → Insurance / Contractors"},
};

const getMatrixDefaults = (bucketName, incidentName) => {
  if (MATRIX_EXAMPLES[incidentName]) return MATRIX_EXAMPLES[incidentName];
  const map = {
    "Security & Physical Safety":      {severity:"Critical", rto:"< 1 hour"},
    "Technology & Operations":         {severity:"High",     rto:"1-4 hours"},
    "Political & Social Unrest":       {severity:"Medium",   rto:"1-3 days"},
    "Legal Issues":                    {severity:"Medium",   rto:"1-3 days"},
    "Reputation & Brand":              {severity:"High",     rto:"4-24 hours"},
    "Facilities & Vendor Disruptions": {severity:"High",     rto:"4-24 hours"},
  };
  const base = map[bucketName] || {severity:"Medium", rto:"4-24 hours"};
  return {...base, response_lead:"", immediate_actions:"", communication:"", escalation_path:""};
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmt = ts => {
  if (!ts) return "";
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
};

const Highlight = ({text, q}) => {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return <>{text.slice(0,i)}<mark style={{background:"#FEF08A",borderRadius:2,padding:"0 1px"}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
};

      {children}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [buckets,    setBuckets]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [loadMsg,    setLoadMsg]    = useState("Connecting to Supabase…");
  const [error,      setError]      = useState(null);
  const [saving,     setSaving]     = useState(false);
  const [toast,      setToast]      = useState(null);
  const [collapsed,  setCollapsed]  = useState({});
  const [newItems,   setNewItems]   = useState({});
  const [editItem,   setEditItem]   = useState(null);
  const [editText,   setEditText]   = useState("");
  const [isAdmin,    setIsAdmin]    = useState(false);
  const [showLogin,  setShowLogin]  = useState(false);
  const [loginUser,  setLoginUser]  = useState("");
  const [loginPass,  setLoginPass]  = useState("");
  const [loginErr,   setLoginErr]   = useState("");
  const [adminOpen,  setAdminOpen]  = useState(false);
  const [adminTab,   setAdminTab]   = useState("buckets");
  const [delItem,    setDelItem]    = useState(null);
  const [delBucket,  setDelBucket]  = useState(null);
  const [addBucket,  setAddBucket]  = useState(false);
  const [editBucket, setEditBucket] = useState(null);
  const [newBkt,     setNewBkt]     = useState({name:"",description:"",owner:"",theme:"red"});
  const [search,     setSearch]     = useState("");
  const [ownerFilter,setOwnerFilter]= useState("all");
  const [dragId,     setDragId]     = useState(null);
  const [dragOver,   setDragOver]   = useState(null);
  const [signoffs,       setSignoffs]       = useState([]);
  const [signoffModal,   setSignoffModal]   = useState(false);
  const [newSignoff,     setNewSignoff]     = useState({name:"",date:"",department:"",screenshot:null});
  const [viewScreenshot, setViewScreenshot] = useState(null);
  const [activeTab,      setActiveTab]      = useState("buckets");
  const [matrixData,     setMatrixData]     = useState([]);
  const [matrixEdit,     setMatrixEdit]     = useState(null);
  const [matrixOpenEdit, setMatrixOpenEdit] = useState(()=>localStorage.getItem("matrixOpenEdit")==="true");
  const [matrixHelp,     setMatrixHelp]     = useState(false);
  const [bucketLeadEdit, setBucketLeadEdit] = useState(null);
  const [bucketLeadValue,setBucketLeadValue]= useState("");
  const refs = useRef({});

  const toast$ = (msg, err=false) => { setToast({msg,err}); setTimeout(()=>setToast(null),3000); };

  const init = async () => {
    setLoading(true); setError(null);
    try {
      setLoadMsg("Fetching buckets…");
      let data = await dbLoad();
      if (!data.length) {
        setLoadMsg("First run — seeding defaults…");
        data = await dbInsert(DEFAULTS);
      }
      setBuckets(data);
      setLoadMsg("Fetching sign-offs…");
      const soData = await soLoad().catch(()=>[]);
      setSignoffs(soData);
      setLoadMsg("Syncing incident matrix…");
      await syncMatrix(data);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };
  useEffect(()=>{ init(); },[]);

  const syncMatrix = async (bkts) => {
    const src = bkts || buckets;
    let existing = [];
    let dbAvailable = true;
    try { existing = await mxLoad(); } catch(e) { existing = []; dbAvailable = false; }
    const existingKeys = new Set(existing.map(r=>`${r.bucket_id}::${r.incident_name}`));
    const expectedKeys = new Set();
    const toInsert = [];
    let localId = -1;
    src.forEach(b => {
      b.items.forEach(item => {
        const key = `${b.id}::${item}`;
        expectedKeys.add(key);
        if (!existingKeys.has(key)) {
          const defs = getMatrixDefaults(b.name, item);
          toInsert.push({bucket_id:b.id, incident_name:item, severity:defs.severity, rto:defs.rto, response_lead:defs.response_lead||"", immediate_actions:defs.immediate_actions||"", communication:defs.communication||"", escalation_path:defs.escalation_path||""});
        }
      });
    });
    const orphaned = existing.filter(r => !expectedKeys.has(`${r.bucket_id}::${r.incident_name}`));
    if (toInsert.length && dbAvailable) {
      try { const inserted = await mxInsert(toInsert); existing = [...existing, ...(Array.isArray(inserted)?inserted:[inserted])]; } catch(e) {
        toInsert.forEach(r => { existing.push({...r, id: localId--}); });
      }
    } else if (toInsert.length) {
      toInsert.forEach(r => { existing.push({...r, id: localId--}); });
    }
    if (dbAvailable) {
      for (const o of orphaned) { try { await mxDelete(o.id); } catch(e) {} }
    }
    existing = existing.filter(r => expectedKeys.has(`${r.bucket_id}::${r.incident_name}`));
    setMatrixData(existing);
  };

  const persist = async (optimisticFn, dbFn) => {
    optimisticFn();
    setSaving(true);
    try { await dbFn(); }
    catch(e) { toast$("Save failed: "+e.message, true); await init(); }
    setSaving(false);
  };

  // ── AUTH ──
  const login = () => {
    if (loginUser===ADMIN_USER && loginPass===ADMIN_PASS) {
      setIsAdmin(true); setShowLogin(false); setLoginErr(""); setLoginUser(""); setLoginPass(""); toast$("Logged in as Admin");
    } else setLoginErr("Invalid credentials.");
  };

  // ── ITEMS ──
  const addItem = bucketId => {
    const text=(newItems[bucketId]||"").trim(); if(!text) return;
    const bk=buckets.find(b=>b.id===bucketId), updated=[...bk.items,text];
    const updatedBuckets=buckets.map(b=>b.id===bucketId?{...b,items:updated,updated_at:new Date().toISOString()}:b);
    setNewItems(n=>({...n,[bucketId]:""}));
    persist(
      ()=>setBuckets(updatedBuckets),
      async()=>{await dbPatch(bucketId,{items:updated}); await syncMatrix(updatedBuckets);}
    );
    toast$("Item added");
  };

  const doDeleteItem = () => {
    const {bId,idx}=delItem;
    const bk=buckets.find(b=>b.id===bId), updated=bk.items.filter((_,i)=>i!==idx);
    const updatedBuckets=buckets.map(b=>b.id===bId?{...b,items:updated,updated_at:new Date().toISOString()}:b);
    setDelItem(null);
    persist(
      ()=>setBuckets(updatedBuckets),
      async()=>{await dbPatch(bId,{items:updated}); await syncMatrix(updatedBuckets);}
    );
    toast$("Item deleted");
  };

  const saveEditItem = () => {
    if(!editItem) return;
    const {bId,idx}=editItem, text=editText.trim(); if(!text) return;
    const bk=buckets.find(b=>b.id===bId), updated=[...bk.items]; updated[idx]=text;
    const updatedBuckets=buckets.map(b=>b.id===bId?{...b,items:updated,updated_at:new Date().toISOString()}:b);
    setEditItem(null);
    persist(
      ()=>setBuckets(updatedBuckets),
      async()=>{await dbPatch(bId,{items:updated}); await syncMatrix(updatedBuckets);}
    );
    toast$("Item updated");
  };

  // ── BUCKETS ──
  const doDeleteBucket = () => {
    const id=delBucket; setDelBucket(null);
    persist(
      ()=>setBuckets(bs=>bs.filter(b=>b.id!==id)),
      ()=>dbDelete(id)
    );
    toast$("Bucket deleted");
  };

  const submitNewBucket = async () => {
    const name=newBkt.name.trim(); if(!name) return;
    const maxOrder=buckets.length?Math.max(...buckets.map(b=>b.bucket_order)):0;
    setAddBucket(false); setSaving(true);
    try {
      const data=await dbInsert([{name,description:newBkt.description.trim(),owner:newBkt.owner.trim(),theme:newBkt.theme,items:[],bucket_order:maxOrder+1}]);
      setBuckets(bs=>[...bs,...(Array.isArray(data)?data:[data])]);
      setNewBkt({name:"",description:"",owner:"",theme:"red"});
      toast$("Bucket added");
    } catch(e){ toast$("Failed: "+e.message,true); }
    setSaving(false);
  };

  const saveEditBucket = () => {
    if(!editBucket?.name?.trim()) return;
    const {id,name,description,owner,theme}=editBucket;
    setEditBucket(null);
    persist(
      ()=>setBuckets(bs=>bs.map(b=>b.id===id?{...b,name:name.trim(),description:description.trim(),owner:owner.trim(),theme,updated_at:new Date().toISOString()}:b)),
      ()=>dbPatch(id,{name:name.trim(),description:description.trim(),owner:owner.trim(),theme})
    );
    toast$("Bucket updated");
  };

  const resetToDefault = async () => {
    setAdminOpen(false); setLoading(true); setLoadMsg("Resetting…");
    try {
      await dbDeleteAll();
      const data=await dbInsert(DEFAULTS);
      setBuckets(data);
      await syncMatrix(data);
      toast$("Reset to defaults");
    } catch(e){ toast$("Reset failed: "+e.message,true); }
    setLoading(false);
  };

  // ── SIGN-OFFS ──
  const handleScreenshotFile = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setNewSignoff(s=>({...s, screenshot: ev.target.result}));
    reader.readAsDataURL(file);
  };

  const addSignoff = async () => {
    const {name, date, department, screenshot} = newSignoff;
    if(!name.trim() || !date) return;
    setSignoffModal(false); setNewSignoff({name:"",date:"",department:"",screenshot:null});
    setSaving(true);
    try {
      const row = await soInsert({name:name.trim(), date, department:department.trim(), screenshot});
      const inserted = Array.isArray(row) ? row[0] : row;
      setSignoffs(s=>[...s, inserted]);
      toast$("Sign-off added");
    } catch(e) { toast$("Save failed: "+e.message, true); }
    setSaving(false);
  };

  const deleteSignoff = async (id) => {
    setSignoffs(s=>s.filter(so=>so.id!==id));
    setSaving(true);
    try { await soDelete(id); toast$("Sign-off removed"); }
    catch(e) { toast$("Delete failed: "+e.message, true); await init(); }
    setSaving(false);
  };

  // ── DRAG ──
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOver(id);};
  const onDrop=(e,tid)=>{
    e.preventDefault(); if(dragId===tid){setDragId(null);setDragOver(null);return;}
    const arr=[...buckets], fi=arr.findIndex(b=>b.id===dragId), ti=arr.findIndex(b=>b.id===tid);
    const [m]=arr.splice(fi,1); arr.splice(ti,0,m);
    setDragId(null); setDragOver(null);
    persist(()=>setBuckets(arr), ()=>Promise.all(arr.map((b,i)=>dbPatch(b.id,{bucket_order:i+1}))));
  };

  // ── EXPORT ──
  const exportCSV = () => {
    const rows=[["Bucket","Name","Owner","Item"]];
    buckets.forEach(b=>b.items.forEach(item=>rows.push([`Bucket ${b.bucket_order}`,b.name,b.owner,item])));
    const csv=rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="incident_buckets.csv"; a.click();
    toast$("CSV downloaded");
  };

  const exportMatrixCSV = () => {
    const rows=[["Bucket","Response Lead","Incident","Severity","Other Partners","Immediate Actions","Communication Protocol","Escalation Path","RTO"]];
    buckets.forEach(b=>{
      const bRows=matrixData.filter(r=>r.bucket_id===b.id);
      bRows.forEach(r=>rows.push([b.name,b.response_lead||"",r.incident_name,r.severity,r.response_lead,r.immediate_actions,r.communication,r.escalation_path,r.rto]));
    });
    const csv=rows.map(r=>r.map(c=>`"${(c||"").replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="incident_matrix.csv"; a.click();
    toast$("Matrix CSV downloaded");
  };

  const saveMatrixCell = async (id, field, value) => {
    setMatrixData(md=>md.map(r=>r.id===id?{...r,[field]:value,updated_at:new Date().toISOString()}:r));
    setMatrixEdit(null);
    setSaving(true);
    try { await mxPatch(id,{[field]:value}); }
    catch(e) { toast$("Save failed: "+e.message, true); await syncMatrix(); }
    setSaving(false);
  };

  const saveBucketLead = async (bucketId) => {
    const val = bucketLeadValue.trim();
    setBuckets(bs=>bs.map(b=>b.id===bucketId?{...b,response_lead:val,updated_at:new Date().toISOString()}:b));
    setBucketLeadEdit(null);
    try { await dbPatch(bucketId,{response_lead:val}); }
    catch(e) { toast$("Save failed: "+e.message, true); }
  };

  const scrollTo=id=>{refs.current[id]?.scrollIntoView({behavior:"smooth",block:"start"});setCollapsed(c=>({...c,[id]:false}));};

  const owners=["all",...Array.from(new Set(buckets.map(b=>b.owner).filter(Boolean)))];
  const filtered=buckets.filter(b=>{
    if(ownerFilter!=="all"&&b.owner!==ownerFilter) return false;
    if(!search) return true;
    const q=search.toLowerCase();
    return b.name.toLowerCase().includes(q)||b.items.some(i=>i.toLowerCase().includes(q));
  });

  // ── SHARED STYLES ──
  const inp={width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none"};
  const lbl={fontSize:12,fontWeight:600,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6};
  const btnP={padding:"9px 18px",borderRadius:8,border:"none",background:"#0F172A",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:14};
  const btnS={padding:"9px 18px",borderRadius:8,border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",fontWeight:600,cursor:"pointer",fontSize:14};

  // ── LOADING / ERROR ──
  if(loading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#64748B"}}>
      <Spinner size={36} color="#2563EB"/>
      <span style={{fontSize:14}}>{loadMsg}</span>
    </div>
  );
  if(error) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:24,gap:16,textAlign:"center"}}>
      <span style={{fontSize:40}}>⚠️</span>
      <p style={{fontSize:13,fontFamily:"monospace",background:"#F8FAFC",padding:16,borderRadius:10,maxWidth:520,wordBreak:"break-all",color:"#DC2626"}}>{error}</p>
      <button onClick={init} style={{...btnP}}>Retry</button>
    </div>
  );

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#F8FAFC",minHeight:"100vh"}}>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:toast.err?"#DC2626":"#1E293B",color:"#fff",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",gap:8,animation:"fadein 0.2s ease"}}>
        {saving&&<Spinner/>}{toast.msg}
      </div>}
      {saving&&!toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:"#1E293B",color:"#fff",borderRadius:10,padding:"9px 14px",fontSize:13,display:"flex",alignItems:"center",gap:8}}>
        <Spinner/>Saving…
      </div>}

      {/* ── MODALS ── */}

      {/* Delete Item */}
      {delItem&&<Modal onClose={()=>setDelItem(null)}>
        <p style={{fontSize:32,textAlign:"center",marginBottom:10}}>🗑️</p>
        <h3 style={{textAlign:"center",marginBottom:8,fontSize:17,color:"#0F172A"}}>Delete this item?</h3>

        {loginErr&&<p style={{color:"#DC2626",fontSize:13,textAlign:"center",marginBottom:12}}>{loginErr}</p>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setShowLogin(false);setLoginErr("");}} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={login} style={{...btnP,flex:1}}>Login</button>
        </div>
      </Modal>}

      {/* Screenshot Lightbox */}
      {viewScreenshot&&<div onClick={()=>setViewScreenshot(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"pointer"}}>
        <img src={viewScreenshot} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:10,objectFit:"contain",boxShadow:"0 8px 40px rgba(0,0,0,0.5)"}} onClick={e=>e.stopPropagation()} alt="Sign-off screenshot"/>
        <button onClick={()=>setViewScreenshot(null)} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:8,padding:"6px 14px",fontSize:14,fontWeight:600,cursor:"pointer"}}>✕ Close</button>
      </div>}

      {/* Add Sign-Off */}
      {signoffModal&&isAdmin&&<Modal onClose={()=>{setSignoffModal(false);setNewSignoff({name:"",date:"",department:"",screenshot:null});}}>
        <h3 style={{marginBottom:18,fontSize:18,color:"#0F172A"}}>✅ Add Sign-Off</h3>
        <label style={lbl}>Name *</label>
        <input value={newSignoff.name} onChange={e=>setNewSignoff(s=>({...s,name:e.target.value}))} placeholder="Full name" style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Department</label>
        <input value={newSignoff.department} onChange={e=>setNewSignoff(s=>({...s,department:e.target.value}))} placeholder="e.g. Legal, IT, HR…" style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Date *</label>
        <input type="date" value={newSignoff.date} onChange={e=>setNewSignoff(s=>({...s,date:e.target.value}))} style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Screenshot (optional)</label>
        <input type="file" accept="image/*" onChange={handleScreenshotFile} style={{fontSize:13,marginBottom:newSignoff.screenshot?10:18,width:"100%"}}/>
        {newSignoff.screenshot&&<img src={newSignoff.screenshot} style={{width:"100%",borderRadius:8,marginBottom:18,border:"1.5px solid #E2E8F0",maxHeight:180,objectFit:"cover"}} alt="preview"/>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setSignoffModal(false);setNewSignoff({name:"",date:"",department:"",screenshot:null});}} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={addSignoff} style={{...btnP,flex:1}} disabled={!newSignoff.name.trim()||!newSignoff.date}>Add Sign-Off</button>
        </div>
      </Modal>}

      {/* Add / Edit Bucket */}
      {(addBucket||editBucket)&&<Modal onClose={()=>{setAddBucket(false);setEditBucket(null);setNewBkt({name:"",description:"",owner:"",theme:"red"});}}>
        <h3 style={{marginBottom:18,fontSize:18,color:"#0F172A"}}>{editBucket?"✏️ Edit Bucket":"➕ Add New Bucket"}</h3>
        <label style={lbl}>Bucket Name *</label>
        <input value={editBucket?editBucket.name:newBkt.name} onChange={e=>editBucket?setEditBucket(b=>({...b,name:e.target.value})):setNewBkt(b=>({...b,name:e.target.value}))} style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Description</label>
        <textarea value={editBucket?editBucket.description:newBkt.description} onChange={e=>editBucket?setEditBucket(b=>({...b,description:e.target.value})):setNewBkt(b=>({...b,description:e.target.value}))} rows={3} style={{...inp,marginBottom:14,resize:"vertical"}}/>
        <label style={lbl}>Likely Owner</label>
        <input value={editBucket?editBucket.owner:newBkt.owner} onChange={e=>editBucket?setEditBucket(b=>({...b,owner:e.target.value})):setNewBkt(b=>({...b,owner:e.target.value}))} style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Color Theme</label>
        <ColorPicker value={editBucket?editBucket.theme:newBkt.theme} onChange={v=>editBucket?setEditBucket(b=>({...b,theme:v})):setNewBkt(b=>({...b,theme:v}))}/>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button onClick={()=>{setAddBucket(false);setEditBucket(null);setNewBkt({name:"",description:"",owner:"",theme:"red"});}} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={editBucket?saveEditBucket:submitNewBucket} style={{...btnP,flex:1}}>{editBucket?"Save Changes":"Create Bucket"}</button>
        </div>
      </Modal>}

      {/* Admin Panel */}
      {adminOpen&&isAdmin&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:490,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:620,maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 12px 50px rgba(0,0,0,0.22)"}}>
          <div style={{padding:"20px 24px 0",borderBottom:"1.5px solid #F1F5F9"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:18,fontWeight:800,color:"#0F172A"}}>⚙️ Admin Panel</h2>
              <button onClick={()=>setAdminOpen(false)} style={{background:"#F1F5F9",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:600,color:"#475569"}}>Close</button>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:-1}}>
              {["buckets","danger"].map(t=>(
                <button key={t} onClick={()=>setAdminTab(t)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",borderBottom:adminTab===t?"2.5px solid #0F172A":"2.5px solid transparent",background:"none",cursor:"pointer",color:adminTab===t?"#0F172A":"#94A3B8"}}>

                </button>
              ))}
            </div>
          </div>
          <div style={{overflowY:"auto",padding:"20px 24px",flex:1}}>
            {adminTab==="buckets"&&<div>
              <p style={{marginBottom:16,fontSize:13.5,color:"#64748B"}}>Total items: <strong>{buckets.reduce((s,b)=>s+b.items.length,0)}</strong></p>
              {buckets.map(bk=>{const c=getTheme(bk.theme);return(
                <div key={bk.id} style={{marginBottom:16,border:`1.5px solid ${c.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{background:c.bg,padding:"8px 14px",display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,fontSize:13.5,color:c.header}}>{bk.name}</span>
                    <span style={{fontSize:12,color:"#94A3B8"}}>{bk.items.length} items</span>
                  </div>
                  {bk.items.map((item,idx)=>(
                    <div key={idx} style={{display:"flex",alignItems:"center",padding:"7px 14px",borderTop:"1px solid #F1F5F9",gap:8}}>
                      <span style={{flex:1,fontSize:13,color:"#334155"}}>{item}</span>
                      <button onClick={()=>setDelItem({bId:bk.id,idx})} style={{background:"#FEF2F2",border:"none",color:"#DC2626",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Delete</button>
                    </div>
                  ))}
                </div>
              );})}
            </div>}
            {adminTab==="danger"&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:20}}>
              <h3 style={{marginBottom:8,fontSize:15,fontWeight:700,color:"#991B1B"}}>Reset All Data</h3>
              <p style={{marginBottom:16,fontSize:13.5,color:"#64748B"}}>Deletes all rows from Supabase and re-seeds the original defaults. Cannot be undone.</p>
              <button onClick={resetToDefault} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:700,cursor:"pointer",fontSize:14}}>Reset to Defaults</button>
            </div>}
          </div>
        </div>
      </div>}

      {/* ── STICKY HEADER ── */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(248,250,252,0.96)",backdropFilter:"blur(8px)",borderBottom:"1px solid #E2E8F0",padding:"12px 16px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:10}}>
            <div>
              <h1 style={{fontSize:20,fontWeight:800,color:"#0F172A"}}>Incident Response Buckets</h1>
              <p style={{color:"#64748B",fontSize:12,display:"flex",alignItems:"center",gap:5,marginTop:2}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:"#16A34A",display:"inline-block"}}></span>
                Connected to Supabase · Changes sync in real time
              </p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {isAdmin?(
                <>
                  <button onClick={()=>setAdminOpen(true)} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⚙️ Admin</button>
                  <button onClick={()=>{setIsAdmin(false);toast$("Logged out");}} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Log Out</button>
                </>
              ):(
                <button onClick={()=>setShowLogin(true)} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>🔐 Admin</button>
              )}
              <button onClick={exportCSV} style={{background:"#fff",color:"#0F172A",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⬇ CSV</button>
              <button onClick={()=>setAddBucket(true)} style={{background:"#16A34A",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>＋ Bucket</button>
            </div>
          </div>
          {/* Search + Filter */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            <div style={{flex:1,minWidth:180,position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8"}}>🔍</span>
              <input placeholder="Search incidents…" value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,paddingLeft:32,fontSize:13.5}}/>
            </div>
            <select value={ownerFilter} onChange={e=>setOwnerFilter(e.target.value)} style={{padding:"9px 12px",borderRadius:8,border:"1.5px solid #E2E8F0",fontSize:13.5,outline:"none",background:"#fff",color:"#334155",cursor:"pointer"}}>
              {owners.map(o=><option key={o} value={o}>{o==="all"?"All Owners":o}</option>)}
            </select>
          </div>
          {/* Tabs */}
          <div style={{display:"flex",gap:0,borderBottom:"2px solid #E2E8F0"}}>
            {[["buckets","📋 Buckets"],["matrix","📊 Incident Matrix"],["survey","📈 Survey Results"],["signedoff","✅ Signed Off"]].map(([id,label])=>(
              <button key={id} onClick={()=>setActiveTab(id)} style={{padding:"8px 18px",fontSize:13,fontWeight:700,border:"none",borderBottom:activeTab===id?"3px solid #0F172A":"3px solid transparent",marginBottom:-2,background:"none",cursor:"pointer",color:activeTab===id?"#0F172A":"#94A3B8"}}>
                {label}
              </button>
            ))}
          </div>
          {/* Jump nav — only on buckets tab */}
          {activeTab==="buckets"&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
            {buckets.map(b=>{const c=getTheme(b.theme);return(
              <button key={b.id} onClick={()=>scrollTo(b.id)} style={{background:c.bg,border:`1px solid ${c.border}`,color:c.header,borderRadius:20,padding:"3px 11px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{b.name}</button>
            );})}
          </div>}
        </div>
      </div>

      {/* ── BUCKETS GRID ── */}
      {activeTab==="buckets"&&<div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,440px),1fr))",gap:18}}>
        {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 0",color:"#94A3B8",fontSize:15}}>No buckets match your search or filter.</div>}
        {filtered.map(bucket=>{
          const c=getTheme(bucket.theme);
          const isCol=collapsed[bucket.id];
          const isDrag=dragId===bucket.id;
          const isOver=dragOver===bucket.id;
          const shown=search?bucket.items.filter(i=>i.toLowerCase().includes(search.toLowerCase())):bucket.items;

          return(
            <div key={bucket.id} ref={el=>refs.current[bucket.id]=el}
              draggable onDragStart={e=>onDragStart(e,bucket.id)} onDragOver={e=>onDragOver(e,bucket.id)} onDrop={e=>onDrop(e,bucket.id)} onDragEnd={()=>{setDragId(null);setDragOver(null);}}
              style={{background:"#fff",borderRadius:14,border:`2px solid ${isOver?c.badge:c.border}`,boxShadow:isDrag?"0 8px 30px rgba(0,0,0,0.15)":"0 2px 12px rgba(0,0,0,0.06)",opacity:isDrag?0.5:1,transition:"border-color 0.15s,box-shadow 0.15s",overflow:"hidden"}}>

              {/* Header */}
              <div style={{background:c.bg,borderBottom:`1.5px solid ${c.border}`,padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{color:"#CBD5E1",cursor:"grab",userSelect:"none",fontSize:16}}>⠿</span>
                  <span style={{background:c.badge,color:c.txt,borderRadius:20,padding:"2px 9px",fontSize:11.5,fontWeight:700,flexShrink:0}}>Bucket {bucket.bucket_order}</span>
                  <span style={{fontWeight:700,color:c.header,flex:1,fontSize:14,lineHeight:1.3}}><Highlight text={bucket.name} q={search}/></span>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    {isAdmin&&<>
                      <button onClick={e=>{e.stopPropagation();setEditBucket({...bucket});}} style={{background:"#EFF6FF",border:"none",color:"#2563EB",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏️</button>
                      <button onClick={e=>{e.stopPropagation();setDelBucket(bucket.id);}} style={{background:"#FEF2F2",border:"none",color:"#DC2626",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑</button>
                    </>}
                    <button onClick={e=>{e.stopPropagation();setCollapsed(c=>({...c,[bucket.id]:!c[bucket.id]}));}} style={{background:"#F1F5F9",border:"none",color:"#64748B",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:13,fontWeight:700}}>{isCol?"▾":"▴"}</button>
                  </div>
                </div>
                {!isCol&&<>
                  <p style={{margin:"4px 0 4px 24px",fontSize:12.5,color:"#475569",lineHeight:1.5}}>{bucket.description}</p>
                  <div style={{display:"flex",justifyContent:"space-between",marginLeft:24}}>
                    <span style={{fontSize:12,color:c.header,fontWeight:600}}>👤 {bucket.owner||"—"}</span>
                    <span style={{fontSize:11,color:"#94A3B8"}}>Updated {fmt(bucket.updated_at)}</span>
                  </div>
                </>}
                {isCol&&<div style={{display:"flex",justifyContent:"space-between",marginLeft:24}}>
                  <span style={{fontSize:12,color:"#94A3B8"}}>{bucket.items.length} items</span>
                  <span style={{fontSize:11,color:"#94A3B8"}}>Updated {fmt(bucket.updated_at)}</span>
                </div>}
              </div>

              {/* Items */}
              {!isCol&&<>
                <div style={{padding:"10px 16px 0"}}>
                  {shown.map((item,idx)=>{
                    const ri=search?bucket.items.indexOf(item):idx;
                    const isEd=editItem?.bId===bucket.id&&editItem?.idx===ri;
                    return(
                      <div key={idx} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,padding:"5px 8px",borderRadius:7,background:isEd?"#F1F5F9":"transparent",cursor:"default"}}

                        onMouseLeave={e=>{if(!isEd)e.currentTarget.style.background="transparent";}}>
                        <span style={{color:c.badge,fontSize:13,flexShrink:0}}>•</span>
                        {isEd?(
                          <>
                            <input autoFocus value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditItem();if(e.key==="Escape")setEditItem(null);}} style={{flex:1,fontSize:13,border:`1.5px solid ${c.border}`,borderRadius:6,padding:"3px 8px",outline:"none"}}/>
                            <button onClick={saveEditItem} style={{background:c.badge,color:"#fff",border:"none",borderRadius:5,padding:"3px 9px",fontSize:12,cursor:"pointer",fontWeight:600}}>Save</button>
                            <button onClick={()=>setEditItem(null)} style={{background:"#E2E8F0",color:"#475569",border:"none",borderRadius:5,padding:"3px 9px",fontSize:12,cursor:"pointer"}}>✕</button>
                          </>
                        ):(
                          <>
                            <span style={{flex:1,fontSize:13.5,color:"#334155",cursor:"pointer",lineHeight:1.45}} onClick={()=>{setEditItem({bId:bucket.id,idx:ri});setEditText(item);}} title="Click to edit"><Highlight text={item} q={search}/></span>
                            {isAdmin&&<button onClick={()=>setDelItem({bId:bucket.id,idx:ri})} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1,flexShrink:0}} onMouseEnter={e=>e.target.style.color="#EF4444"} onMouseLeave={e=>e.target.style.color="#CBD5E1"}>×</button>}
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{padding:"8px 16px 14px",display:"flex",gap:8}}>
                  <input placeholder="Add a new incident…" value={newItems[bucket.id]||""} onChange={e=>setNewItems(n=>({...n,[bucket.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem(bucket.id)}
                    style={{flex:1,fontSize:13,border:"1.5px solid #E2E8F0",borderRadius:7,padding:"7px 10px",outline:"none",color:"#334155"}}
                    onFocus={e=>e.target.style.borderColor=c.badge} onBlur={e=>e.target.style.borderColor="#E2E8F0"}/>
                  <button onClick={()=>addItem(bucket.id)} style={{background:c.badge,color:c.txt,border:"none",borderRadius:7,padding:"7px 13px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add</button>
                </div>

              </>}
            </div>
          );
        })}
      </div>}

      {/* ── INCIDENT MATRIX TAB ── */}
      {activeTab==="matrix"&&<div style={{maxWidth:1200,margin:"0 auto",padding:"24px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:"#0F172A"}}>Incident Matrix</h2>
            <p style={{fontSize:13,color:"#64748B",marginTop:2}}>Response plan for every incident across all buckets</p>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <button onClick={()=>setMatrixHelp(true)} style={{background:"#EFF6FF",border:"1.5px solid #BFDBFE",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#2563EB"}}>? Column Guide</button>
            <button onClick={exportMatrixCSV} style={{background:"#fff",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#475569"}}>Export CSV</button>
            <button onClick={()=>window.print()} style={{background:"#fff",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#475569"}}>Print</button>
          </div>
        </div>

        {/* Column Guide Modal */}
        {matrixHelp&&<div onClick={()=>setMatrixHelp(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:900,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,maxWidth:620,width:"100%",maxHeight:"85vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
            <div style={{padding:"20px 24px",borderBottom:"1.5px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <h3 style={{fontSize:16,fontWeight:800,color:"#0F172A",margin:0}}>Incident Matrix — Column Guide</h3>
              <button onClick={()=>setMatrixHelp(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94A3B8",padding:4}}>&times;</button>
            </div>
            <div style={{padding:"20px 24px",display:"flex",flexDirection:"column",gap:18}}>
              {[
                {icon:"📋",title:"Incident",desc:"The name of the incident as defined in the corresponding bucket. This column is read-only and automatically syncs when incidents are added, edited, or removed from the Buckets tab."},
                {icon:"🔴",title:"Severity",color:"#DC2626",desc:"Classifies how critical the incident is to operations, safety, or reputation. Use this to prioritize response efforts and resource allocation.",options:["Critical — Immediate threat to life, safety, or core operations. Requires all-hands response.","High — Significant disruption or risk. Requires rapid coordinated response within hours.","Medium — Moderate impact with manageable disruption. Requires planned response within 1-3 days.","Low — Minor impact. Can be addressed through standard procedures."]},
                {icon:"👤",title:"Response Lead (per bucket)",desc:"Set in the colored bucket header row. The single person or role accountable for the entire bucket's response — only one per bucket. Admin-editable; click the value next to 👤 Response Lead in any bucket header to set or change it."},
                {icon:"🤝",title:"Other Partners",desc:"Additional teams, roles, or individuals who collaborate with the Response Lead on this specific incident. Use this column to list cross-functional partners (e.g., Legal, HR, IT Security, External Counsel) who support — but do not own — the response."},
                {icon:"⚡",title:"Immediate Actions",desc:"The first steps to take within the first 30 minutes of the incident being identified. These should be numbered, specific, and actionable — think of them as a quick-reference checklist that anyone can follow under pressure. Include calls to make, systems to activate, and people to notify."},
                {icon:"📢",title:"Communication Protocol",desc:"Defines who gets notified, through what channel, and in what timeframe. Should cover internal communication (staff, leadership) and external communication (clients, media, authorities) as applicable. Include specific channels (phone, email, mass text, Slack) and timing expectations."},
                {icon:"⬆️",title:"Escalation Path",desc:"The chain of command if the situation worsens, the primary lead is unavailable, or the incident exceeds the initial response capacity. Format as a clear sequence (e.g., Manager → Director → VP → CEO → External Counsel) so anyone can identify the next person to contact."},
                {icon:"⏱️",title:"Recovery Time Objective (RTO)",color:"#475569",desc:"The target time to restore normal operations after the incident. This sets expectations for stakeholders and helps prioritize recovery efforts.",options:["< 1 hour — Life-safety or critical system incidents.","1-4 hours — Major operational disruptions.","4-24 hours — Significant but contained incidents.","1-3 days — Incidents requiring investigation or external coordination.","3-7 days — Complex recovery involving multiple teams or vendors.","7+ days — Major structural or reputational recovery."]},
              ].map((col,i)=>(
                <div key={i} style={{background:"#F8FAFC",borderRadius:12,padding:"14px 18px",border:"1px solid #E2E8F0"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:18}}>{col.icon}</span>
                    <span style={{fontSize:14,fontWeight:700,color:col.color||"#0F172A"}}>{col.title}</span>
                  </div>
                  <p style={{fontSize:13,color:"#475569",lineHeight:1.6,margin:0}}>{col.desc}</p>
                  {col.options&&<ul style={{margin:"10px 0 0",paddingLeft:18,display:"flex",flexDirection:"column",gap:4}}>
                    {col.options.map((o,j)=><li key={j} style={{fontSize:12.5,color:"#64748B",lineHeight:1.5}}>{o}</li>)}
                  </ul>}
                </div>
              ))}
            </div>
            <div style={{padding:"16px 24px",borderTop:"1.5px solid #E2E8F0",textAlign:"right"}}>
              <button onClick={()=>setMatrixHelp(false)} style={{padding:"9px 24px",borderRadius:8,border:"none",background:"#0F172A",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:14}}>Got it</button>
            </div>
          </div>
        </div>}

        {matrixData.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:"#94A3B8"}}>
            <p style={{fontSize:32,marginBottom:12}}>📊</p>
            <p style={{fontSize:15,fontWeight:500}}>No matrix data yet.</p>
            <p style={{fontSize:13,marginTop:6}}>Matrix auto-populates from your buckets.</p>
          </div>
        ):(
          <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"calc(100vh - 260px)",borderRadius:12,border:"1.5px solid #E2E8F0",background:"#fff"}}>
            <table style={{width:"100%",minWidth:1000,borderCollapse:"collapse",fontSize:13}}>
              <thead>
                <tr style={{background:"#F8FAFC"}}>
                  <th style={{position:"sticky",left:0,top:0,zIndex:5,background:"#F8FAFC",padding:"10px 14px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:180}}>Incident</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:90}}>Severity</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:130}}>Other Partners</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:200}}>Immediate Actions</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:170}}>Communication</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:150}}>Escalation Path</th>
                  <th style={{position:"sticky",top:0,zIndex:4,background:"#F8FAFC",padding:"10px 12px",textAlign:"left",fontWeight:700,color:"#0F172A",borderBottom:"2px solid #E2E8F0",minWidth:100}}>RTO</th>
                </tr>
              </thead>
              <tbody>
                {(()=>{
                  const filteredMx = buckets.filter(b=>{
                    if(ownerFilter!=="all"&&b.owner!==ownerFilter) return false;
                    if(!search) return true;
                    const q=search.toLowerCase();
                    return b.name.toLowerCase().includes(q)||b.items.some(i=>i.toLowerCase().includes(q));
                  });
                  return filteredMx.map(bucket=>{
                    const c=getTheme(bucket.theme);
                    let bRows=matrixData.filter(r=>r.bucket_id===bucket.id);
                    if(search){const q=search.toLowerCase(); bRows=bRows.filter(r=>r.incident_name.toLowerCase().includes(q));}
                    if(bRows.length===0) return null;
                    const sevColor={Critical:"#DC2626",High:"#EA580C",Medium:"#D97706",Low:"#16A34A"};

                    return(
                      <React.Fragment key={bucket.id}>
                        <tr>
                          <td colSpan={7} style={{background:c.bg,color:c.header,fontWeight:700,padding:"10px 14px",borderBottom:`2px solid ${c.border}`,fontSize:13}}>
                            <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                              <div style={{display:"flex",alignItems:"center",gap:8}}>
                                <span style={{background:c.badge,color:c.txt,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700}}>{bucket.bucket_order}</span>
                                <span>{bucket.name}</span>
                                <span style={{fontWeight:400,fontSize:12,color:c.header,opacity:0.7}}>({bRows.length} incidents)</span>
                              </div>
                              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.55)",padding:"3px 10px",borderRadius:20,border:`1px solid ${c.border}`}}>
                                <span style={{fontSize:11,fontWeight:700,color:c.header,letterSpacing:0.3,textTransform:"uppercase"}}>👤 Response Lead:</span>
                                {bucketLeadEdit===bucket.id?(
                                  <input
                                    autoFocus
                                    value={bucketLeadValue}
                                    onChange={e=>setBucketLeadValue(e.target.value)}
                                    onBlur={()=>saveBucketLead(bucket.id)}
                                    onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();saveBucketLead(bucket.id);}if(e.key==="Escape"){setBucketLeadEdit(null);}}}
                                    placeholder="Name or role"
                                    style={{padding:"2px 8px",borderRadius:6,border:"1.5px solid "+c.border,fontSize:12,minWidth:160,outline:"none"}}
                                  />
                                ):(
                                  <span
                                    onClick={()=>{setBucketLeadEdit(bucket.id);setBucketLeadValue(bucket.response_lead||"");}}
                                    style={{fontSize:12,fontWeight:600,color:bucket.response_lead?c.header:"#94A3B8",cursor:"pointer",textDecoration:!bucket.response_lead?"underline dotted":"none"}}
                                    title="Click to edit"
                                  >
                                    {bucket.response_lead||"Click to set"}
                                  </span>
                                )}
                              </div>
                            </div>
                          </td>
                        </tr>
                        {bRows.map(row=>{
                          const isEditing = (field) => matrixEdit && matrixEdit.id===row.id && matrixEdit.field===field;
                          const cellStyle = (field) => ({
                            padding:"8px 12px",borderBottom:"1px solid #F1F5F9",
                            cursor:"pointer",
                            background:isEditing(field)?"#FFFBEB":"transparent",
                            verticalAlign:"top",lineHeight:"1.4",maxWidth:220,
                          });
                          const renderCell = (field, value) => {
                            if(isEditing(field)){
                              if(field==="severity") return(
                                <select autoFocus value={matrixEdit.value} onChange={e=>setMatrixEdit(m=>({...m,value:e.target.value}))} onBlur={()=>saveMatrixCell(row.id,field,matrixEdit.value)} style={{width:"100%",padding:"4px 6px",borderRadius:6,border:"1.5px solid #E2E8F0",fontSize:13}}>
                                  {SEVERITY_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
                                </select>
                              );
                              if(field==="rto") return(
                                <select autoFocus value={matrixEdit.value} onChange={e=>setMatrixEdit(m=>({...m,value:e.target.value}))} onBlur={()=>saveMatrixCell(row.id,field,matrixEdit.value)} style={{width:"100%",padding:"4px 6px",borderRadius:6,border:"1.5px solid #E2E8F0",fontSize:13}}>
                                  {RTO_OPTIONS.map(r=><option key={r} value={r}>{r}</option>)}
                                </select>
                              );
                              return(
                                <textarea autoFocus value={matrixEdit.value} onChange={e=>setMatrixEdit(m=>({...m,value:e.target.value}))} onKeyDown={e=>{if(e.key==="Escape"){setMatrixEdit(null);}if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();saveMatrixCell(row.id,field,matrixEdit.value);}}} onBlur={()=>saveMatrixCell(row.id,field,matrixEdit.value)} rows={2} style={{width:"100%",padding:"4px 6px",borderRadius:6,border:"1.5px solid #E2E8F0",fontSize:13,resize:"vertical",fontFamily:"inherit"}}/>
                              );
                            }
                            if(field==="severity"){
                              const sc=sevColor[value]||"#64748B";
                              return <span style={{background:sc+"18",color:sc,padding:"2px 8px",borderRadius:12,fontSize:12,fontWeight:600}}>{value||"—"}</span>;
                            }
                            if(field==="rto") return <span style={{fontSize:12,fontWeight:500,color:"#475569"}}>{value||"—"}</span>;
                            return <span style={{fontSize:12.5,color:value?"#334155":"#CBD5E1",whiteSpace:"pre-wrap"}}>{value||"—"}</span>;
                          };
                          const startEdit = (field, value) => { setMatrixEdit({id:row.id, field, value: value||""}); };

                          return(
                            <tr key={row.id} style={{borderLeft:`4px solid ${c.badge}`}}>
                              <td style={{position:"sticky",left:0,zIndex:2,background:"#fff",padding:"8px 14px",borderBottom:"1px solid #F1F5F9",fontWeight:600,color:"#0F172A",verticalAlign:"top",fontSize:12.5}}>{row.incident_name}</td>
                              <td style={cellStyle("severity")} onClick={()=>startEdit("severity",row.severity)}>{renderCell("severity",row.severity)}</td>
                              <td style={cellStyle("response_lead")} onClick={()=>startEdit("response_lead",row.response_lead)}>{renderCell("response_lead",row.response_lead)}</td>
                              <td style={cellStyle("immediate_actions")} onClick={()=>startEdit("immediate_actions",row.immediate_actions)}>{renderCell("immediate_actions",row.immediate_actions)}</td>
                              <td style={cellStyle("communication")} onClick={()=>startEdit("communication",row.communication)}>{renderCell("communication",row.communication)}</td>
                              <td style={cellStyle("escalation_path")} onClick={()=>startEdit("escalation_path",row.escalation_path)}>{renderCell("escalation_path",row.escalation_path)}</td>
                              <td style={cellStyle("rto")} onClick={()=>startEdit("rto",row.rto)}>{renderCell("rto",row.rto)}</td>
                            </tr>
                          );
                        })}
                      </React.Fragment>
                    );
                  });
                })()}
              </tbody>
            </table>
          </div>
        )}
        {matrixData.length>0&&<p style={{fontSize:11.5,color:"#94A3B8",marginTop:12,textAlign:"center"}}>Click any cell to edit \u00b7 Changes save automatically</p>}
      </div>}

      {/* ── SURVEY RESULTS TAB ── */}
      {activeTab==="survey" && <SurveyResults/>}

      {/* ── SIGNED OFF TAB ── */}
      {activeTab==="signedoff"&&<div style={{maxWidth:780,margin:"0 auto",padding:"24px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div>
            <h2 style={{fontSize:18,fontWeight:800,color:"#0F172A"}}>Signed Off</h2>
            <p style={{fontSize:13,color:"#64748B",marginTop:2}}>Record of approvals across all buckets</p>
          </div>
          {isAdmin&&<button onClick={()=>setSignoffModal(true)} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add Sign-Off</button>}
        </div>

        {signoffs.length===0?(
          <div style={{textAlign:"center",padding:"60px 0",color:"#94A3B8"}}>
            <p style={{fontSize:32,marginBottom:12}}>✅</p>
            <p style={{fontSize:15,fontWeight:500}}>No sign-offs recorded yet.</p>
            {isAdmin&&<p style={{fontSize:13,marginTop:6}}>Click "+ Add Sign-Off" to get started.</p>}
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {signoffs.map(so=>(
              <div key={so.id} style={{background:"#fff",borderRadius:12,border:"1.5px solid #E2E8F0",padding:"14px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                    <p style={{fontSize:14,fontWeight:700,color:"#0F172A",margin:0}}>{so.name}</p>
                    {so.department&&<span style={{background:"#F1F5F9",border:"1px solid #E2E8F0",color:"#475569",borderRadius:4,padding:"1px 8px",fontSize:12,fontWeight:600}}>{so.department}</span>}
                  </div>
                  <p style={{fontSize:12,color:"#94A3B8",margin:0}}>{so.date}</p>
                </div>
                {isAdmin&&<div style={{display:"flex",gap:6,flexShrink:0}}>
                  {so.screenshot&&<button onClick={()=>setViewScreenshot(so.screenshot)} style={{background:"#EFF6FF",border:"none",color:"#2563EB",borderRadius:7,padding:"5px 10px",fontSize:13,cursor:"pointer",fontWeight:600}} title="View screenshot">🖼</button>}
                  <button onClick={()=>deleteSignoff(so.id)} style={{background:"#FEF2F2",border:"none",color:"#DC2626",borderRadius:7,padding:"5px 10px",fontSize:13,cursor:"pointer",fontWeight:600}}>Delete</button>
                </div>}
              </div>
            ))}
          </div>
        )}
      </div>}

      <p style={{textAlign:"center",color:"#94A3B8",fontSize:12,paddingBottom:24}}>Powered by Supabase · Only admins can delete items or buckets</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
