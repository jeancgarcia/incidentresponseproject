<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Incident Response Buckets</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',system-ui,sans-serif;background:#F8FAFC;min-height:100vh}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  input,textarea,select{font-family:inherit}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#F1F5F9}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONFIG ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = "https://niqzkombzncxxihhulqq.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pcXprb21iem5jeHhpaGh1bHFxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2OTI5NTgsImV4cCI6MjA4OTI2ODk1OH0.9DMbwxPi4yBkXG034sakwh6tnxt-AUcKkt_MER71qcg";
const ADMIN_USER = "admin";
const ADMIN_PASS = "LLF@Secure2026";
const TABLE = "incident_buckets";

const HEADERS = {
  "Content-Type": "application/json",
  "apikey": SUPABASE_KEY,
  "Authorization": `Bearer ${SUPABASE_KEY}`,
  "Prefer": "return=representation"
};

// ── THEMES ───────────────────────────────────────────────────────────────────
const THEMES = [
  {id:"red",    bg:"#FEF2F2",border:"#FECACA",badge:"#DC2626",txt:"#fff",header:"#991B1B"},
  {id:"blue",   bg:"#EFF6FF",border:"#BFDBFE",badge:"#2563EB",txt:"#fff",header:"#1E3A8A"},
  {id:"orange", bg:"#FFF7ED",border:"#FED7AA",badge:"#EA580C",txt:"#fff",header:"#9A3412"},
  {id:"green",  bg:"#F0FDF4",border:"#BBF7D0",badge:"#16A34A",txt:"#fff",header:"#14532D"},
  {id:"purple", bg:"#FDF4FF",border:"#E9D5FF",badge:"#9333EA",txt:"#fff",header:"#581C87"},
  {id:"yellow", bg:"#FFFBEB",border:"#FDE68A",badge:"#D97706",txt:"#fff",header:"#78350F"},
  {id:"teal",   bg:"#F0FDFA",border:"#99F6E4",badge:"#0D9488",txt:"#fff",header:"#134E4A"},
  {id:"pink",   bg:"#FDF2F8",border:"#F9A8D4",badge:"#DB2777",txt:"#fff",header:"#831843"},
];
const getTheme = id => THEMES.find(t => t.id === id) || THEMES[0];

// ── DEFAULTS ─────────────────────────────────────────────────────────────────
const DEFAULTS = [
  {bucket_order:1,name:"Security & Physical Safety",description:"Incidents that represent a direct physical threat to employees, clients, or facilities.",owner:"Security + HR",theme:"red",items:["Law enforcement visits (ICE, Police, FBI)","Workplace violence (client or employee)","Bomb threat","Death in office","Active shooter / suspicious person in proximity","Robbery / Burglary"]},
  {bucket_order:2,name:"Technology & Operations",description:"Incidents that disrupt the firm's operational capacity.",owner:"IT + Operations",theme:"blue",items:["Cyber attack","Litify outage or compromise","Loss of power/internet (with office access)","Loss of power/internet (without office access / office closure)","Loss of ISP connection","Building systems failure (HVAC or other)","IT/security breach (laptops, CCTV)"]},
  {bucket_order:3,name:"Political & Social Unrest",description:"Political or social events that generate fear, uncertainty, or the need for urgent communication toward employees or clients.",owner:"HR (employees) + Legal + Marketing/Comms",theme:"orange",items:["International political unrest affecting employees (Venezuela, Mexico, Iran, etc.)","Government shutdown impacting cases or employees","Protests near LLF offices","High-impact social events in the U.S. related to immigration"]},
  {bucket_order:4,name:"Legal Issues",description:"Announcements, changes, or perceived changes in immigration policy that create confusion or fear among clients.",owner:"Legal + Marketing",theme:"green",items:["Executive announcements or presidential statements on immigration","National ICE operations with impact on clients","Legislative or executive changes affecting active cases"]},
  {bucket_order:5,name:"Reputation & Brand",description:"Situations that threaten the firm's reputation publicly or internally.",owner:"Marketing + Legal + HR",theme:"purple",items:["Scams using the Lisinski name or impersonating Angel (clients being defrauded)","Negative media and social media crisis","Employee conduct with public impact"]},
  {bucket_order:6,name:"Facilities & Vendor Disruptions",description:"Incidents related to physical facilities or critical vendors that interrupt operations.",owner:"(Procurement Manager?) + Operations",theme:"yellow",items:["Building damage (water, gas, fire on business or non-business hours)","Utility failure","Mail vendor disruptions","Bank outage","Extreme weather events causing office closures"]},
];

// ── SUPABASE HELPERS ──────────────────────────────────────────────────────────
const sb = async (method, path, body) => {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers: HEADERS,
    body: body ? JSON.stringify(body) : undefined
  });
  if (method === "DELETE" || r.status === 204) return [];
  const data = await r.json();
  if (!r.ok) throw new Error(data.message || JSON.stringify(data));
  return data;
};

const dbLoad   = ()         => sb("GET",    `${TABLE}?select=*&order=bucket_order.asc`);
const dbInsert = rows       => sb("POST",   TABLE, rows);
const dbPatch  = (id, body) => sb("PATCH",  `${TABLE}?id=eq.${id}`, {...body, updated_at: new Date().toISOString()});
const dbDelete = id         => sb("DELETE", `${TABLE}?id=eq.${id}`);
const dbDeleteAll = ()      => sb("DELETE", `${TABLE}?id=gte.0`);

// ── UTILS ─────────────────────────────────────────────────────────────────────
const fmt = ts => {
  if (!ts) return "";
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return "just now";
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
};

const Highlight = ({text, q}) => {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return <>{text.slice(0,i)}<mark style={{background:"#FEF08A",borderRadius:2,padding:"0 1px"}}>{text.slice(i,i+q.length)}</mark>{text.slice(i+q.length)}</>;
};

// ── SUB-COMPONENTS ────────────────────────────────────────────────────────────
const Spinner = ({size=14,color="#fff"}) => (
  <span style={{width:size,height:size,border:`2px solid rgba(255,255,255,0.3)`,borderTop:`2px solid ${color}`,borderRadius:"50%",display:"inline-block",animation:"spin 0.6s linear infinite",flexShrink:0}}/>
);

const ColorPicker = ({value, onChange}) => (
  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
    {THEMES.map(t => (
      <button key={t.id} onClick={()=>onChange(t.id)} title={t.id}
        style={{width:28,height:28,borderRadius:"50%",background:t.badge,border:value===t.id?"3px solid #0F172A":"3px solid transparent",cursor:"pointer",outline:"none"}}/>
    ))}
  </div>
);

const Modal = ({children, onClose}) => (
  <div onClick={e=>{if(e.target===e.currentTarget)onClose();}}
    style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16,animation:"fadein 0.15s ease"}}>
    <div style={{background:"#fff",borderRadius:14,padding:28,maxWidth:440,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
      {children}
    </div>
  </div>
);

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [buckets,    setBuckets]    = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [loadMsg,    setLoadMsg]    = useState("Connecting to Supabase…");
  const [error,      setError]      = useState(null);
  const [saving,     setSaving]     = useState(false);
  const [toast,      setToast]      = useState(null);
  const [collapsed,  setCollapsed]  = useState({});
  const [newItems,   setNewItems]   = useState({});
  const [editItem,   setEditItem]   = useState(null);
  const [editText,   setEditText]   = useState("");
  const [isAdmin,    setIsAdmin]    = useState(false);
  const [showLogin,  setShowLogin]  = useState(false);
  const [loginUser,  setLoginUser]  = useState("");
  const [loginPass,  setLoginPass]  = useState("");
  const [loginErr,   setLoginErr]   = useState("");
  const [adminOpen,  setAdminOpen]  = useState(false);
  const [adminTab,   setAdminTab]   = useState("buckets");
  const [delItem,    setDelItem]    = useState(null);
  const [delBucket,  setDelBucket]  = useState(null);
  const [addBucket,  setAddBucket]  = useState(false);
  const [editBucket, setEditBucket] = useState(null);
  const [newBkt,     setNewBkt]     = useState({name:"",description:"",owner:"",theme:"red"});
  const [search,     setSearch]     = useState("");
  const [ownerFilter,setOwnerFilter]= useState("all");
  const [dragId,     setDragId]     = useState(null);
  const [dragOver,   setDragOver]   = useState(null);
  const refs = useRef({});

  const toast$ = (msg, err=false) => { setToast({msg,err}); setTimeout(()=>setToast(null),3000); };

  const init = async () => {
    setLoading(true); setError(null);
    try {
      setLoadMsg("Fetching buckets…");
      let data = await dbLoad();
      if (!data.length) {
        setLoadMsg("First run — seeding defaults…");
        data = await dbInsert(DEFAULTS);
      }
      setBuckets(data);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };
  useEffect(()=>{ init(); },[]);

  const persist = async (optimisticFn, dbFn) => {
    optimisticFn();
    setSaving(true);
    try { await dbFn(); }
    catch(e) { toast$("Save failed: "+e.message, true); await init(); }
    setSaving(false);
  };

  // ── AUTH ──
  const login = () => {
    if (loginUser===ADMIN_USER && loginPass===ADMIN_PASS) {
      setIsAdmin(true); setShowLogin(false); setLoginErr(""); setLoginUser(""); setLoginPass(""); toast$("Logged in as Admin");
    } else setLoginErr("Invalid credentials.");
  };

  // ── ITEMS ──
  const addItem = bucketId => {
    const text=(newItems[bucketId]||"").trim(); if(!text) return;
    const bk=buckets.find(b=>b.id===bucketId), updated=[...bk.items,text];
    setNewItems(n=>({...n,[bucketId]:""}));
    persist(
      ()=>setBuckets(bs=>bs.map(b=>b.id===bucketId?{...b,items:updated,updated_at:new Date().toISOString()}:b)),
      ()=>dbPatch(bucketId,{items:updated})
    );
    toast$("Item added");
  };

  const doDeleteItem = () => {
    const {bId,idx}=delItem;
    const bk=buckets.find(b=>b.id===bId), updated=bk.items.filter((_,i)=>i!==idx);
    setDelItem(null);
    persist(
      ()=>setBuckets(bs=>bs.map(b=>b.id===bId?{...b,items:updated,updated_at:new Date().toISOString()}:b)),
      ()=>dbPatch(bId,{items:updated})
    );
    toast$("Item deleted");
  };

  const saveEditItem = () => {
    if(!editItem) return;
    const {bId,idx}=editItem, text=editText.trim(); if(!text) return;
    const bk=buckets.find(b=>b.id===bId), updated=[...bk.items]; updated[idx]=text;
    setEditItem(null);
    persist(
      ()=>setBuckets(bs=>bs.map(b=>b.id===bId?{...b,items:updated,updated_at:new Date().toISOString()}:b)),
      ()=>dbPatch(bId,{items:updated})
    );
    toast$("Item updated");
  };

  // ── BUCKETS ──
  const doDeleteBucket = () => {
    const id=delBucket; setDelBucket(null);
    persist(
      ()=>setBuckets(bs=>bs.filter(b=>b.id!==id)),
      ()=>dbDelete(id)
    );
    toast$("Bucket deleted");
  };

  const submitNewBucket = async () => {
    const name=newBkt.name.trim(); if(!name) return;
    const maxOrder=buckets.length?Math.max(...buckets.map(b=>b.bucket_order)):0;
    setAddBucket(false); setSaving(true);
    try {
      const data=await dbInsert([{name,description:newBkt.description.trim(),owner:newBkt.owner.trim(),theme:newBkt.theme,items:[],bucket_order:maxOrder+1}]);
      setBuckets(bs=>[...bs,...(Array.isArray(data)?data:[data])]);
      setNewBkt({name:"",description:"",owner:"",theme:"red"});
      toast$("Bucket added");
    } catch(e){ toast$("Failed: "+e.message,true); }
    setSaving(false);
  };

  const saveEditBucket = () => {
    if(!editBucket?.name?.trim()) return;
    const {id,name,description,owner,theme}=editBucket;
    setEditBucket(null);
    persist(
      ()=>setBuckets(bs=>bs.map(b=>b.id===id?{...b,name:name.trim(),description:description.trim(),owner:owner.trim(),theme,updated_at:new Date().toISOString()}:b)),
      ()=>dbPatch(id,{name:name.trim(),description:description.trim(),owner:owner.trim(),theme})
    );
    toast$("Bucket updated");
  };

  const resetToDefault = async () => {
    setAdminOpen(false); setLoading(true); setLoadMsg("Resetting…");
    try {
      await dbDeleteAll();
      const data=await dbInsert(DEFAULTS);
      setBuckets(data); toast$("Reset to defaults");
    } catch(e){ toast$("Reset failed: "+e.message,true); }
    setLoading(false);
  };

  // ── DRAG ──
  const onDragStart=(e,id)=>{setDragId(id);e.dataTransfer.effectAllowed="move";};
  const onDragOver=(e,id)=>{e.preventDefault();setDragOver(id);};
  const onDrop=(e,tid)=>{
    e.preventDefault(); if(dragId===tid){setDragId(null);setDragOver(null);return;}
    const arr=[...buckets], fi=arr.findIndex(b=>b.id===dragId), ti=arr.findIndex(b=>b.id===tid);
    const [m]=arr.splice(fi,1); arr.splice(ti,0,m);
    setDragId(null); setDragOver(null);
    persist(()=>setBuckets(arr), ()=>Promise.all(arr.map((b,i)=>dbPatch(b.id,{bucket_order:i+1}))));
  };

  // ── EXPORT ──
  const exportCSV = () => {
    const rows=[["Bucket","Name","Owner","Item"]];
    buckets.forEach(b=>b.items.forEach(item=>rows.push([`Bucket ${b.bucket_order}`,b.name,b.owner,item])));
    const csv=rows.map(r=>r.map(c=>`"${c.replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"})); a.download="incident_buckets.csv"; a.click();
    toast$("CSV downloaded");
  };

  const scrollTo=id=>{refs.current[id]?.scrollIntoView({behavior:"smooth",block:"start"});setCollapsed(c=>({...c,[id]:false}));};

  const owners=["all",...Array.from(new Set(buckets.map(b=>b.owner).filter(Boolean)))];
  const filtered=buckets.filter(b=>{
    if(ownerFilter!=="all"&&b.owner!==ownerFilter) return false;
    if(!search) return true;
    const q=search.toLowerCase();
    return b.name.toLowerCase().includes(q)||b.items.some(i=>i.toLowerCase().includes(q));
  });

  // ── SHARED STYLES ──
  const inp={width:"100%",padding:"9px 12px",borderRadius:8,border:"1.5px solid #E2E8F0",fontSize:14,outline:"none"};
  const lbl={fontSize:12,fontWeight:600,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:6};
  const btnP={padding:"9px 18px",borderRadius:8,border:"none",background:"#0F172A",color:"#fff",fontWeight:600,cursor:"pointer",fontSize:14};
  const btnS={padding:"9px 18px",borderRadius:8,border:"1.5px solid #E2E8F0",background:"#fff",color:"#475569",fontWeight:600,cursor:"pointer",fontSize:14};

  // ── LOADING / ERROR ──
  if(loading) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,color:"#64748B"}}>
      <Spinner size={36} color="#2563EB"/>
      <span style={{fontSize:14}}>{loadMsg}</span>
    </div>
  );
  if(error) return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",padding:24,gap:16,textAlign:"center"}}>
      <span style={{fontSize:40}}>⚠️</span>
      <p style={{fontSize:13,fontFamily:"monospace",background:"#F8FAFC",padding:16,borderRadius:10,maxWidth:520,wordBreak:"break-all",color:"#DC2626"}}>{error}</p>
      <button onClick={init} style={{...btnP}}>Retry</button>
    </div>
  );

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#F8FAFC",minHeight:"100vh"}}>

      {/* Toast */}
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:toast.err?"#DC2626":"#1E293B",color:"#fff",borderRadius:10,padding:"10px 18px",fontSize:14,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",display:"flex",alignItems:"center",gap:8,animation:"fadein 0.2s ease"}}>
        {saving&&<Spinner/>}{toast.msg}
      </div>}
      {saving&&!toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,background:"#1E293B",color:"#fff",borderRadius:10,padding:"9px 14px",fontSize:13,display:"flex",alignItems:"center",gap:8}}>
        <Spinner/>Saving…
      </div>}

      {/* ── MODALS ── */}

      {/* Delete Item */}
      {delItem&&<Modal onClose={()=>setDelItem(null)}>
        <p style={{fontSize:32,textAlign:"center",marginBottom:10}}>🗑️</p>
        <h3 style={{textAlign:"center",marginBottom:8,fontSize:17,color:"#0F172A"}}>Delete this item?</h3>
        <p style={{textAlign:"center",color:"#64748B",fontSize:13.5,marginBottom:20,lineHeight:1.5}}>"{buckets.find(b=>b.id===delItem.bId)?.items[delItem.idx]}"</p>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setDelItem(null)} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={doDeleteItem} style={{...btnP,flex:1,background:"#DC2626"}}>Delete</button>
        </div>
      </Modal>}

      {/* Delete Bucket */}
      {delBucket&&<Modal onClose={()=>setDelBucket(null)}>
        <p style={{fontSize:32,textAlign:"center",marginBottom:10}}>🪣</p>
        <h3 style={{textAlign:"center",marginBottom:8,fontSize:17,color:"#0F172A"}}>Delete this bucket?</h3>
        <p style={{textAlign:"center",color:"#64748B",marginBottom:6,fontSize:13.5}}><strong>"{buckets.find(b=>b.id===delBucket)?.name}"</strong></p>
        <p style={{textAlign:"center",color:"#EF4444",fontSize:13,marginBottom:20}}>All {buckets.find(b=>b.id===delBucket)?.items.length} items will be deleted.</p>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setDelBucket(null)} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={doDeleteBucket} style={{...btnP,flex:1,background:"#DC2626"}}>Delete Bucket</button>
        </div>
      </Modal>}

      {/* Login */}
      {showLogin&&<Modal onClose={()=>{setShowLogin(false);setLoginErr("");}}>
        <p style={{fontSize:32,textAlign:"center",marginBottom:8}}>🔐</p>
        <h3 style={{textAlign:"center",marginBottom:18,fontSize:18,color:"#0F172A"}}>Admin Login</h3>
        <label style={lbl}>Username</label>
        <input value={loginUser} onChange={e=>setLoginUser(e.target.value)} placeholder="Username" style={{...inp,marginBottom:10}}/>
        <label style={lbl}>Password</label>
        <input type="password" value={loginPass} onChange={e=>setLoginPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Password" style={{...inp,marginBottom:loginErr?6:16}}/>
        {loginErr&&<p style={{color:"#DC2626",fontSize:13,textAlign:"center",marginBottom:12}}>{loginErr}</p>}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{setShowLogin(false);setLoginErr("");}} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={login} style={{...btnP,flex:1}}>Login</button>
        </div>
      </Modal>}

      {/* Add / Edit Bucket */}
      {(addBucket||editBucket)&&<Modal onClose={()=>{setAddBucket(false);setEditBucket(null);setNewBkt({name:"",description:"",owner:"",theme:"red"});}}>
        <h3 style={{marginBottom:18,fontSize:18,color:"#0F172A"}}>{editBucket?"✏️ Edit Bucket":"➕ Add New Bucket"}</h3>
        <label style={lbl}>Bucket Name *</label>
        <input value={editBucket?editBucket.name:newBkt.name} onChange={e=>editBucket?setEditBucket(b=>({...b,name:e.target.value})):setNewBkt(b=>({...b,name:e.target.value}))} style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Description</label>
        <textarea value={editBucket?editBucket.description:newBkt.description} onChange={e=>editBucket?setEditBucket(b=>({...b,description:e.target.value})):setNewBkt(b=>({...b,description:e.target.value}))} rows={3} style={{...inp,marginBottom:14,resize:"vertical"}}/>
        <label style={lbl}>Likely Owner</label>
        <input value={editBucket?editBucket.owner:newBkt.owner} onChange={e=>editBucket?setEditBucket(b=>({...b,owner:e.target.value})):setNewBkt(b=>({...b,owner:e.target.value}))} style={{...inp,marginBottom:14}}/>
        <label style={lbl}>Color Theme</label>
        <ColorPicker value={editBucket?editBucket.theme:newBkt.theme} onChange={v=>editBucket?setEditBucket(b=>({...b,theme:v})):setNewBkt(b=>({...b,theme:v}))}/>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <button onClick={()=>{setAddBucket(false);setEditBucket(null);setNewBkt({name:"",description:"",owner:"",theme:"red"});}} style={{...btnS,flex:1}}>Cancel</button>
          <button onClick={editBucket?saveEditBucket:submitNewBucket} style={{...btnP,flex:1}}>{editBucket?"Save Changes":"Create Bucket"}</button>
        </div>
      </Modal>}

      {/* Admin Panel */}
      {adminOpen&&isAdmin&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:490,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
        <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:620,maxHeight:"85vh",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 12px 50px rgba(0,0,0,0.22)"}}>
          <div style={{padding:"20px 24px 0",borderBottom:"1.5px solid #F1F5F9"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{fontSize:18,fontWeight:800,color:"#0F172A"}}>⚙️ Admin Panel</h2>
              <button onClick={()=>setAdminOpen(false)} style={{background:"#F1F5F9",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:600,color:"#475569"}}>Close</button>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:-1}}>
              {["buckets","danger"].map(t=>(
                <button key={t} onClick={()=>setAdminTab(t)} style={{padding:"8px 16px",fontSize:13,fontWeight:600,border:"none",borderBottom:adminTab===t?"2.5px solid #0F172A":"2.5px solid transparent",background:"none",cursor:"pointer",color:adminTab===t?"#0F172A":"#94A3B8"}}>
                  {t==="buckets"?"📋 Manage Buckets":"⚠️ Danger Zone"}
                </button>
              ))}
            </div>
          </div>
          <div style={{overflowY:"auto",padding:"20px 24px",flex:1}}>
            {adminTab==="buckets"&&<div>
              <p style={{marginBottom:16,fontSize:13.5,color:"#64748B"}}>Total items: <strong>{buckets.reduce((s,b)=>s+b.items.length,0)}</strong></p>
              {buckets.map(bk=>{const c=getTheme(bk.theme);return(
                <div key={bk.id} style={{marginBottom:16,border:`1.5px solid ${c.border}`,borderRadius:10,overflow:"hidden"}}>
                  <div style={{background:c.bg,padding:"8px 14px",display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontWeight:700,fontSize:13.5,color:c.header}}>{bk.name}</span>
                    <span style={{fontSize:12,color:"#94A3B8"}}>{bk.items.length} items</span>
                  </div>
                  {bk.items.map((item,idx)=>(
                    <div key={idx} style={{display:"flex",alignItems:"center",padding:"7px 14px",borderTop:"1px solid #F1F5F9",gap:8}}>
                      <span style={{flex:1,fontSize:13,color:"#334155"}}>{item}</span>
                      <button onClick={()=>setDelItem({bId:bk.id,idx})} style={{background:"#FEF2F2",border:"none",color:"#DC2626",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:12,fontWeight:600}}>Delete</button>
                    </div>
                  ))}
                </div>
              );})}
            </div>}
            {adminTab==="danger"&&<div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:10,padding:20}}>
              <h3 style={{marginBottom:8,fontSize:15,fontWeight:700,color:"#991B1B"}}>Reset All Data</h3>
              <p style={{marginBottom:16,fontSize:13.5,color:"#64748B"}}>Deletes all rows from Supabase and re-seeds the original defaults. Cannot be undone.</p>
              <button onClick={resetToDefault} style={{background:"#DC2626",color:"#fff",border:"none",borderRadius:8,padding:"9px 20px",fontWeight:700,cursor:"pointer",fontSize:14}}>Reset to Defaults</button>
            </div>}
          </div>
        </div>
      </div>}

      {/* ── STICKY HEADER ── */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(248,250,252,0.96)",backdropFilter:"blur(8px)",borderBottom:"1px solid #E2E8F0",padding:"12px 16px"}}>
        <div style={{maxWidth:980,margin:"0 auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:10}}>
            <div>
              <h1 style={{fontSize:20,fontWeight:800,color:"#0F172A"}}>Incident Response Buckets</h1>
              <p style={{color:"#64748B",fontSize:12,display:"flex",alignItems:"center",gap:5,marginTop:2}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:"#16A34A",display:"inline-block"}}></span>
                Connected to Supabase · Changes sync in real time
              </p>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {isAdmin?(
                <>
                  <button onClick={()=>setAdminOpen(true)} style={{background:"#0F172A",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⚙️ Admin</button>
                  <button onClick={()=>{setIsAdmin(false);toast$("Logged out");}} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>Log Out</button>
                </>
              ):(
                <button onClick={()=>setShowLogin(true)} style={{background:"#F1F5F9",color:"#475569",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>🔐 Admin</button>
              )}
              <button onClick={exportCSV} style={{background:"#fff",color:"#0F172A",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>⬇ CSV</button>
              <button onClick={()=>setAddBucket(true)} style={{background:"#16A34A",color:"#fff",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer"}}>＋ Bucket</button>
            </div>
          </div>
          {/* Search + Filter */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
            <div style={{flex:1,minWidth:180,position:"relative"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"#94A3B8"}}>🔍</span>
              <input placeholder="Search incidents…" value={search} onChange={e=>setSearch(e.target.value)} style={{...inp,paddingLeft:32,fontSize:13.5}}/>
            </div>
            <select value={ownerFilter} onChange={e=>setOwnerFilter(e.target.value)} style={{padding:"9px 12px",borderRadius:8,border:"1.5px solid #E2E8F0",fontSize:13.5,outline:"none",background:"#fff",color:"#334155",cursor:"pointer"}}>
              {owners.map(o=><option key={o} value={o}>{o==="all"?"All Owners":o}</option>)}
            </select>
          </div>
          {/* Jump nav */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {buckets.map(b=>{const c=getTheme(b.theme);return(
              <button key={b.id} onClick={()=>scrollTo(b.id)} style={{background:c.bg,border:`1px solid ${c.border}`,color:c.header,borderRadius:20,padding:"3px 11px",fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{b.name}</button>
            );})}
          </div>
        </div>
      </div>

      {/* ── BUCKETS GRID ── */}
      <div style={{maxWidth:980,margin:"0 auto",padding:"20px 16px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(min(100%,440px),1fr))",gap:18}}>
        {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 0",color:"#94A3B8",fontSize:15}}>No buckets match your search or filter.</div>}
        {filtered.map(bucket=>{
          const c=getTheme(bucket.theme);
          const isCol=collapsed[bucket.id];
          const isDrag=dragId===bucket.id;
          const isOver=dragOver===bucket.id;
          const shown=search?bucket.items.filter(i=>i.toLowerCase().includes(search.toLowerCase())):bucket.items;

          return(
            <div key={bucket.id} ref={el=>refs.current[bucket.id]=el}
              draggable onDragStart={e=>onDragStart(e,bucket.id)} onDragOver={e=>onDragOver(e,bucket.id)} onDrop={e=>onDrop(e,bucket.id)} onDragEnd={()=>{setDragId(null);setDragOver(null);}}
              style={{background:"#fff",borderRadius:14,border:`2px solid ${isOver?c.badge:c.border}`,boxShadow:isDrag?"0 8px 30px rgba(0,0,0,0.15)":"0 2px 12px rgba(0,0,0,0.06)",opacity:isDrag?0.5:1,transition:"border-color 0.15s,box-shadow 0.15s",overflow:"hidden"}}>

              {/* Header */}
              <div style={{background:c.bg,borderBottom:`1.5px solid ${c.border}`,padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{color:"#CBD5E1",cursor:"grab",userSelect:"none",fontSize:16}}>⠿</span>
                  <span style={{background:c.badge,color:c.txt,borderRadius:20,padding:"2px 9px",fontSize:11.5,fontWeight:700,flexShrink:0}}>Bucket {bucket.bucket_order}</span>
                  <span style={{fontWeight:700,color:c.header,flex:1,fontSize:14,lineHeight:1.3}}><Highlight text={bucket.name} q={search}/></span>
                  <div style={{display:"flex",gap:5,flexShrink:0}}>
                    {isAdmin&&<>
                      <button onClick={e=>{e.stopPropagation();setEditBucket({...bucket});}} style={{background:"#EFF6FF",border:"none",color:"#2563EB",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12,fontWeight:600}}>✏️</button>
                      <button onClick={e=>{e.stopPropagation();setDelBucket(bucket.id);}} style={{background:"#FEF2F2",border:"none",color:"#DC2626",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:12,fontWeight:600}}>🗑</button>
                    </>}
                    <button onClick={e=>{e.stopPropagation();setCollapsed(c=>({...c,[bucket.id]:!c[bucket.id]}));}} style={{background:"#F1F5F9",border:"none",color:"#64748B",borderRadius:6,padding:"3px 8px",cursor:"pointer",fontSize:13,fontWeight:700}}>{isCol?"▾":"▴"}</button>
                  </div>
                </div>
                {!isCol&&<>
                  <p style={{margin:"4px 0 4px 24px",fontSize:12.5,color:"#475569",lineHeight:1.5}}>{bucket.description}</p>
                  <div style={{display:"flex",justifyContent:"space-between",marginLeft:24}}>
                    <span style={{fontSize:12,color:c.header,fontWeight:600}}>👤 {bucket.owner||"—"}</span>
                    <span style={{fontSize:11,color:"#94A3B8"}}>Updated {fmt(bucket.updated_at)}</span>
                  </div>
                </>}
                {isCol&&<div style={{display:"flex",justifyContent:"space-between",marginLeft:24}}>
                  <span style={{fontSize:12,color:"#94A3B8"}}>{bucket.items.length} items</span>
                  <span style={{fontSize:11,color:"#94A3B8"}}>Updated {fmt(bucket.updated_at)}</span>
                </div>}
              </div>

              {/* Items */}
              {!isCol&&<>
                <div style={{padding:"10px 16px 0"}}>
                  {shown.map((item,idx)=>{
                    const ri=search?bucket.items.indexOf(item):idx;
                    const isEd=editItem?.bId===bucket.id&&editItem?.idx===ri;
                    return(
                      <div key={idx} style={{display:"flex",alignItems:"center",gap:8,marginBottom:5,padding:"5px 8px",borderRadius:7,background:isEd?"#F1F5F9":"transparent",cursor:"default"}}
                        onMouseEnter={e=>{if(!isEd)e.currentTarget.style.background="#F8FAFC";}}
                        onMouseLeave={e=>{if(!isEd)e.currentTarget.style.background="transparent";}}>
                        <span style={{color:c.badge,fontSize:13,flexShrink:0}}>•</span>
                        {isEd?(
                          <>
                            <input autoFocus value={editText} onChange={e=>setEditText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditItem();if(e.key==="Escape")setEditItem(null);}} style={{flex:1,fontSize:13,border:`1.5px solid ${c.border}`,borderRadius:6,padding:"3px 8px",outline:"none"}}/>
                            <button onClick={saveEditItem} style={{background:c.badge,color:"#fff",border:"none",borderRadius:5,padding:"3px 9px",fontSize:12,cursor:"pointer",fontWeight:600}}>Save</button>
                            <button onClick={()=>setEditItem(null)} style={{background:"#E2E8F0",color:"#475569",border:"none",borderRadius:5,padding:"3px 9px",fontSize:12,cursor:"pointer"}}>✕</button>
                          </>
                        ):(
                          <>
                            <span style={{flex:1,fontSize:13.5,color:"#334155",cursor:"pointer",lineHeight:1.45}} onClick={()=>{setEditItem({bId:bucket.id,idx:ri});setEditText(item);}} title="Click to edit"><Highlight text={item} q={search}/></span>
                            {isAdmin&&<button onClick={()=>setDelItem({bId:bucket.id,idx:ri})} style={{background:"none",border:"none",color:"#CBD5E1",cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1,flexShrink:0}} onMouseEnter={e=>e.target.style.color="#EF4444"} onMouseLeave={e=>e.target.style.color="#CBD5E1"}>×</button>}
                          </>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div style={{padding:"8px 16px 14px",display:"flex",gap:8}}>
                  <input placeholder="Add a new incident…" value={newItems[bucket.id]||""} onChange={e=>setNewItems(n=>({...n,[bucket.id]:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&addItem(bucket.id)}
                    style={{flex:1,fontSize:13,border:"1.5px solid #E2E8F0",borderRadius:7,padding:"7px 10px",outline:"none",color:"#334155"}}
                    onFocus={e=>e.target.style.borderColor=c.badge} onBlur={e=>e.target.style.borderColor="#E2E8F0"}/>
                  <button onClick={()=>addItem(bucket.id)} style={{background:c.badge,color:c.txt,border:"none",borderRadius:7,padding:"7px 13px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Add</button>
                </div>
              </>}
            </div>
          );
        })}
      </div>
      <p style={{textAlign:"center",color:"#94A3B8",fontSize:12,paddingBottom:24}}>Powered by Supabase · Only admins can delete items or buckets</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
